name: Update and Build

on:
  schedule:
    - cron: '0 0 1,15 * *'  # 每月1日/15日触发
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - "**/README.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update_build:
    name: Update and Build geosite.dat
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          path: code

      - name: Download cdn.txt
        working-directory: code
        run: curl -o cdn https://ruleset.skk.moe/Clash/domainset/cdn.txt

      - name: Download list gfw
        working-directory: code
        run: curl -o gfw https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/gfw.list

      - name: Download list anti-ad
        working-directory: code
        run: curl -o anti-ad https://raw.githubusercontent.com/privacy-protection-tools/anti-AD/master/anti-ad-domains.txt

      - name: Download list skk reject base
        working-directory: code
        run: curl -o skk-reject https://ruleset.skk.moe/Clash/domainset/reject.txt

      - name: Download list from 1-stream/1stream-public-utils
        working-directory: code
        run: curl -o dns-1stream https://raw.githubusercontent.com/1-stream/1stream-public-utils/refs/heads/main/stream.text.list

      - name: Remove "+." characters
        working-directory: code
        run: |
          # sed -i 's/\+\.//g' cdn
          # sed -i '/^[+.#]/!{/^$/! s/^/full:/}; s/\+\.//g' cdn

          # 修改main.go后不再需要删除下划线
          # 删除 cdn和skk-reject 里所有包含 '_' 的行（严格域名模式下都不合法）
          # sed -i '/_/d' data/cdn
          # sed -i '/_/d' data/skk-reject

          sed -i '/^\+\./{s/^\+\.\(.*\)/\1/;b};/^#/b;/^$/b;s/^/full:/' cdn
          sed -i 's/+\.//g' gfw
          # sed -i 's/\+\.//g' skk-reject
          sed -i '/^[+.#]/!{/^$/! s/^/full:/}; s/\+\.//g' skk-reject

      - name: Media area from 1-stream
        working-directory: code
        run: |
          sed -n '/# ---------- > Japan Media/,/# ---------- >/p' dns-1stream | sed '$d' > dns-1stream-jp
          sed -n '/# ---------- > Taiwan Media/,/# ---------- >/p' dns-1stream | sed '$d' > dns-1stream-tw

      - name: Create data directory if it doesn't exist
        working-directory: code
        run: mkdir -p data

      - name: Move file to data directory
        working-directory: code
        run: |
          mv cdn data/
          mv gfw data/
          mv anti-ad data/
          mv skk-reject data/
          mv dns-1stream data/
          mv dns-1stream-jp data/
          mv dns-1stream-tw data/
          
          # 修改main.go后不再需要删除下划线
          # 删除 cdn和skk-reject 里所有包含 '_' 的行（严格域名模式下都不合法）
          # sed -i '/_/d' data/cdn
          # sed -i '/_/d' data/skk-reject

      - name: Commit changes
        working-directory: code
        continue-on-error: true

        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/cdn
          git add data/gfw
          git add data/anti-ad
          git add data/skk-reject
          git add data/dns-1stream
          git add data/dns-1stream-jp
          git add data/dns-1stream-tw
          git commit -m 'Update cdn and removing "+." characters'
          git push origin master


      # Build geosite.dat   
      - name: Checkout codebase
        uses: actions/checkout@v6
        with:
          path: code

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: code/go.mod
          cache-dependency-path: code/go.sum

      - name: Set variables
        run: |
          echo "RELEASE_NAME=$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV
          echo "TAG_NAME=$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV
        shell: bash

      - name: Build dlc.dat and plain lists
        run: |
          cd code || exit 1
          go run ./ --outputdir=../ --exportlists=reject-list,user-games,nojp-proxy,normal-proxy,emby-s,dns-proxy,dns-1stream-jp,dns-1stream-tw,user-PCgame,user-Mobilegame,cdn,dns-unlock
          go run ./cmd/datdump/main.go --inputdata=../dlc.dat --outputdir=../ --exportlists=_all_
          # cd ../ && rm -rf code
        
          # 兼容目的，复制一份 geosite.dat
          cd ..
          cp dlc.dat geosite.dat
          rm -rf code

      - name: Generate dlc.dat sha256 hash
        run: |
          sha256sum dlc.dat > dlc.dat.sha256sum
          sha256sum dlc.dat_plain.yml > dlc.dat_plain.yml.sha256sum

          # geosite.dat 的哈希
          sha256sum geosite.dat > geosite.dat.sha256sum

      # 没必要
      # - name: Generate Zip
      #   run: |
          # zip -9 dlc.dat.zip dlc.dat
          # sha256sum dlc.dat.zip > dlc.dat.zip.sha256sum


          # zip -9 geosite.dat.zip geosite.dat
          # sha256sum geosite.dat.zip > geosite.dat.zip.sha256sum

      - name: Generate XZ
        run: |
          xz -z -9 -k dlc.dat
          sha256sum dlc.dat.xz > dlc.dat.xz.sha256sum

      # 将输出的列表转换为 Clash classical 规则，并提取包含 @cn 的规则到单独的 @cn 文件 
      - name: Convert geosite rules to Clash classical rules and extract @cn rules
        shell: bash
        run: |
          set -euo pipefail

              mapfile -t files < <(find . -type f -name "*.txt" ! -name "*@cn.txt")

              for file in "${files[@]}"; do
                if [ ! -f "$file" ]; then
                  echo "Skip: $file not found"
                  continue
                fi

                dir="$(dirname "$file")"
                filename="$(basename "$file")"
                stem="${filename%.txt}"
                cn_file="${dir}/${stem}@cn.txt"

                tmp_all="$(mktemp)"
                tmp_cn="$(mktemp)"

                echo "Processing: $file"

                awk -v all="$tmp_all" -v cn="$tmp_cn" '
                  function trim(s) {
                    gsub(/^[[:space:]]+|[[:space:]]+$/, "", s)
                    return s
                  }

                  function has_cn_tag(s, t, n, arr, i) {
                    t = s

                    # 把常见分隔符都改成空格。
                    # 这样：
                    # example.com:@ads,@cn
                    # example.com @ads @cn
                    # example.com:@cn
                    # 都能变成独立字段 @cn。
                    gsub(/[,:[:space:]]+/, " ", t)

                    n = split(t, arr, /[[:space:]]+/)

                    for (i = 1; i <= n; i++) {
                      if (arr[i] == "@cn") {
                        return 1
                      }
                    }

                    return 0
                  }

                  function clean_tags(s) {
                    s = trim(s)

                    # 删除所有 tag，包括：
                    # @cn
                    # @!cn
                    # @ads
                    # @ad
                    #
                    # 覆盖这些形式：
                    # example.com @ads @cn
                    # example.com:@ads,@cn
                    # example.com:@!cn,@ads
                    # domain:example.com:@cn
                    # DOMAIN-SUFFIX,example.com:@ads,@cn
                    #
                    # 先把以 空格/冒号/逗号 开头的 tag 整段删掉。
                    while (s ~ /(^|[[:space:]:,])@!?[A-Za-z0-9_.-]+/) {
                      gsub(/(^|[[:space:]:,])@!?[A-Za-z0-9_.-]+/, "", s)
                    }

                    # 清理可能残留的分隔符
                    gsub(/[[:space:]]+/, " ", s)
                    gsub(/[[:space:]]*,[[:space:]]*/, ",", s)
                    gsub(/[[:space:]]*:[[:space:]]*/, ":", s)

                    # 删除末尾残留的逗号或冒号
                    sub(/[,:]+$/, "", s)

                    return trim(s)
                  }

                  function first_field_after_comma(s, pos, rest, arr) {
                    pos = index(s, ",")
                    if (pos == 0) {
                      return ""
                    }

                    rest = substr(s, pos + 1)

                    # 注意：这里不要在清理 tag 前 split 逗号。
                    # 因为 @cn 可能在逗号后面。
                    # 先统一清理 tag。
                    rest = clean_tags(rest)

                    split(rest, arr, ",")

                    return trim(arr[1])
                  }

                  function convert(original, raw, value, rule_type, pos) {
                    raw = trim(original)

                    if (raw == "") {
                      return ""
                    }

                    # Clash classical 格式
                    if (raw ~ /^(DOMAIN|DOMAIN-SUFFIX|DOMAIN-KEYWORD|DOMAIN-REGEX),/) {
                      pos = index(raw, ",")
                      rule_type = substr(raw, 1, pos - 1)
                      value = first_field_after_comma(raw)

                      if (value == "") {
                        return ""
                      }

                      return rule_type "," value
                    }

                    raw = clean_tags(raw)

                    if (raw == "") {
                      return ""
                    }

                    if (raw ~ /^domain:/) {
                      value = raw
                      sub(/^domain:/, "", value)
                      value = clean_tags(value)

                      if (value == "") {
                        return ""
                      }

                      return "DOMAIN-SUFFIX," value
                    }

                    if (raw ~ /^full:/) {
                      value = raw
                      sub(/^full:/, "", value)
                      value = clean_tags(value)

                      if (value == "") {
                        return ""
                      }

                      return "DOMAIN," value
                    }

                    if (raw ~ /^regexp:/) {
                      value = raw
                      sub(/^regexp:/, "", value)
                      value = clean_tags(value)

                      if (value == "") {
                        return ""
                      }

                      return "DOMAIN-REGEX," value
                    }

                    value = clean_tags(raw)

                    if (value == "") {
                      return ""
                    }

                    return "DOMAIN-SUFFIX," value
                  }

                  {
                    original = $0

                    # 先判断原始整行是否有正向 @cn。
                    # @!cn 不算 @cn。
                    is_cn = has_cn_tag(original)

                    converted = convert(original)

                    if (original ~ /@/) {
                      print "TAG-LINE:", original > "/dev/stderr"
                      print "IS-CN:", is_cn > "/dev/stderr"
                      print "CONVERTED:", converted > "/dev/stderr"
                    }

                    if (converted != "") {
                      if (!(converted in seen_all)) {
                        print converted >> all
                        seen_all[converted] = 1
                      }

                      if (is_cn && !(converted in seen_cn)) {
                        print converted >> cn
                        seen_cn[converted] = 1
                      }
                    }
                  }
                ' "$file"

                mv "$tmp_all" "$file"

                if [ -s "$tmp_cn" ]; then
                  mv "$tmp_cn" "$cn_file"
                  echo "Created: $cn_file"
                else
                  rm -f "$tmp_cn"

                  if [ -f "$cn_file" ]; then
                    rm -f "$cn_file"
                    echo "Removed stale empty @cn file: $cn_file"
                  else
                    echo "No @cn rules found, skip creating: $cn_file"
                  fi
                fi

                echo "Updated: $file"
              done


      - name: Git push assets to "release" branch
        run: |
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          # git add *.txt *.sha256sum dlc.dat dlc.dat.zip dlc.dat.xz
          git add *.txt *.sha256sum geosite.dat dlc.dat dlc.dat.xz dlc.dat_plain.yml
          git commit -m "${{ env.RELEASE_NAME }}"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f -u origin release

      - name: Release and upload assets
        run: |
          gh release create ${{ env.TAG_NAME }} --generate-notes --latest --title ${{ env.RELEASE_NAME }} ./dlc.dat ./dlc.dat.* ./dlc.dat_plain.yml ./dlc.dat_plain.yml.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}